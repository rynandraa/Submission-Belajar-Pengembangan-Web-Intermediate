<!doctype html>
<html lang="id">

<head>
  <meta http-equiv="Content-Type" content="text/html;charset=UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="StoryApp — Bagikan momen terbaik Anda dengan dunia. Platform berbagi cerita berbasis peta interaktif." />
  <link rel="shortcut icon" href="favicon.png" type="image/x-icon" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#4f46e5" />
  <link rel="apple-touch-icon" href="images/logo.png" />
  <title>StoryApp — Berbagi Cerita</title>

  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />

  <!-- Leaflet JS -->

  <!-- SweetAlert2 -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <!-- Note: CSS dan JS bundle otomatis di-inject oleh HtmlWebpackPlugin -->

<body>
  <!-- Skip to content untuk Aksesibilitas -->
  <a href="#content" class="skip-link">Skip to content</a>

  <header class="main-header">
    <div class="header-inner">
      <a href="#/" class="brand-link" aria-label="StoryApp — Halaman Utama">
        <i class="fas fa-book-open brand-icon"></i>
        <span class="brand-title">StoryApp</span>
      </a>

      <nav id="navigation" class="navigation" aria-label="Navigasi utama">
        <ul class="nav-list">
          <li class="nav-item">
            <a href="#/" aria-label="Halaman Home">
              <i class="fas fa-home"></i>
              <span>Home</span>
            </a>
          </li>
          <li class="nav-item auth-related d-none">
            <a href="#/add-story" aria-label="Tambah Story Baru">
              <i class="fas fa-plus-circle"></i>
              <span>Tambah Story</span>
            </a>
          </li>
          <li class="nav-item auth-related d-none">
            <a href="#" id="logout-btn" aria-label="Logout dari akun">
              <i class="fas fa-sign-out-alt"></i>
              <span>Logout</span>
            </a>
          </li>
          <li class="nav-item guest-related">
            <a href="#/login" aria-label="Login ke akun Anda">
              <i class="fas fa-sign-in-alt"></i>
              <span>Login</span>
            </a>
          </li>
          <li class="nav-item guest-related">
            <a href="#/register" aria-label="Daftarkan akun baru">
              <i class="fas fa-user-plus"></i>
              <span>Daftar</span>
            </a>
          </li>
        </ul>
      </nav>

  <footer class="main-footer">
